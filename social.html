<style>
  :root {
    --bg-main: #212121;
    --bg-card: #282936;
    --accent-1: #00CED1;
    --accent-2: #40E0D0;
    --accent-3: #00BFFF;
    --text-main: #ffffff;
    --text-dim: rgba(255,255,255,0.62);
    --border-dim: rgba(255,255,255,0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* ===== Секция с градиентным фоном (тот же приём, что и на странице доната) ===== */
  .social-page-section {
    position: relative;
    overflow: hidden;
    min-height: calc(100vh - 62px);
    background: linear-gradient(135deg, #282936 0%, #1a1b23 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .social-page-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 25% 15%, rgba(0, 206, 209, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 75% 85%, rgba(64, 224, 208, 0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  .social-card {
    position: relative;
    width: 100%;
    max-width: 480px;
    background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
    border: 1px solid var(--border-dim);
    border-radius: 18px;
    padding: 40px 32px;
    backdrop-filter: blur(12px);
    text-align: center;
  }

  .social-card h1 {
    font-size: 1.7rem;
    font-weight: 800;
    font-size: 1.5rem;
    margin: 0 0 6px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .social-card .subtitle {
    color: var(--text-dim);
    font-size: 0.95rem;
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 30px;
  }

  .social-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .social-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-dim);
    border-radius: 14px;
    text-decoration: none;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
  }

  .social-link:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.22);
  }

  .social-link:active { transform: scale(0.98); }

  .social-icon {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .social-icon svg {
    width: 22px;
    height: 22px;
  }

  .social-text { flex: 1; min-width: 0; text-align: center; }

  .social-name {
    color: var(--text-main);
    font-weight: 700;
    font-size: 1.15rem;
    font-size: 0.98rem;
    margin: 0 0 2px;
    text-align: center;
  }

  .social-desc {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin: 0;
    text-align: center;
  }

  .social-arrow {
    flex-shrink: 0;
    color: rgba(255,255,255,0.3);
  }

  /* Брендовые фоны иконок */
  .bg-tiktok    { background: linear-gradient(135deg, #25F4EE 0%, #000000 55%, #FE2C55 100%); }
  .bg-youtube   { background: #FF0000; }
  .bg-vk        { background: #0077FF; }
  .bg-instagram { background: linear-gradient(135deg, #FEDA75 0%, #FA7E1E 25%, #D62976 50%, #962FBF 75%, #4F5BD5 100%); }
  .bg-telegram  { background: #229ED9; }
  .bg-discord   { background: #5865F2; }

  .social-icon svg { color: #fff; }
</style>

<script>
  // Мобильное меню — идентично index.html/donate.html
  document.addEventListener('DOMContentLoaded', function() {
    const menuButton = document.querySelector('[data-collapse-toggle="navbar-sticky"]');
    const menu = document.getElementById('navbar-sticky');

    if (menuButton && menu) {
      menuButton.addEventListener('click', function() {
        const isExpanded = this.getAttribute('aria-expanded') === 'true';

        if (isExpanded) {
          menu.classList.remove('show');
          setTimeout(() => { menu.style.display = 'none'; }, 400);
        } else {
          menu.style.display = 'block';
          setTimeout(() => { menu.classList.add('show'); }, 10);
        }
        this.setAttribute('aria-expanded', String(!isExpanded));
      });

      document.addEventListener('click', function(event) {
        if (!menu.contains(event.target) && !menuButton.contains(event.target)) {
          if (menu.classList.contains('show')) {
            menu.classList.remove('show');
            setTimeout(() => { menu.style.display = 'none'; }, 400);
            menuButton.setAttribute('aria-expanded', 'false');
          }
        }
      });
    }
  });
</script>
