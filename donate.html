  :root {
    --bg-main: #212121;
    --bg-card: #282936;
    --accent-1: #00CED1;
    --accent-2: #40E0D0;
    --accent-3: #00BFFF;
    --text-main: #ffffff;
    --text-dim: rgba(255,255,255,0.62);
    --border-dim: rgba(255,255,255,0.12);
    --danger: #ff5c5c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;

  /* ===== Секция с градиентным фоном (перенесено из .donate-section старого donate.html) ===== */

    position: relative;
    overflow: hidden;
    min-height: calc(100vh - 62px);
    background: linear-gradient(135deg, #282936 0%, #1a1b23 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .donate-page-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 25% 15%, rgba(0, 206, 209, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 75% 85%, rgba(64, 224, 208, 0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  .donate-card {
    position: relative;
    width: 100%;
    max-width: 440px;
    background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
    border: 1px solid var(--border-dim);
    border-radius: 18px;
    padding: 36px 32px;
    backdrop-filter: blur(12px);
  }

  .donate-card h1 {
    font-size: 1.5rem;
    margin: 0 0 6px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .donate-card .subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 6px;
    margin-top: 18px;
  }

  input[type="text"], select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-dim);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text-main);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus, select:focus {
    border-color: var(--accent-1);
  }

  select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2340E0D0' stroke-width='2'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 18px;
    padding-right: 38px;
    cursor: pointer;
  }

  select option {
    background: var(--bg-card);
    color: var(--text-main);
  }

  .price-preview {
    margin-top: 20px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-dim);
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
    color: var(--text-dim);
  }

  .price-preview .amount {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text-main);
  }

  .pay-btn {
    width: 100%;
    margin-top: 26px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    color: #0a0a0a;
    background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 50%, var(--accent-3) 100%);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .pay-btn:hover { opacity: 0.9; }
  .pay-btn:active { transform: scale(0.98); }
  .pay-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .error-msg {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    background: rgba(255,92,92,0.1);
    border: 1px solid rgba(255,92,92,0.3);
    color: var(--danger);
    font-size: 0.85rem;
    display: none;
  }

  .error-msg.visible { display: block; }

  .hint {
    margin-top: 18px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.35);
    text-align: center;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(10,10,10,0.3);
    border-top-color: #0a0a0a;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

  <section class="donate-page-section">
  <div class="donate-card">
    <h1>Поддержать сервер</h1>
    <p class="subtitle">Выбери привилегию и укажи свой ник — донат зачислится автоматически.</p>

    <form id="donate-form">
      <label for="nickname">Игровой никнейм</label>
      <input type="text" id="nickname" name="nickname" placeholder="Steve_2011" required
             pattern="[A-Za-z0-9_]{3,16}" maxlength="16"
             title="От 3 до 16 символов: латиница, цифры, нижнее подчёркивание">

      <label for="product">Привилегия</label>
      <select id="product" name="product" required>
        <option value="" disabled selected>Выберите товар</option>
        <!-- value = внутренний ID товара, data-price берётся ТОЛЬКО для отображения.
             Реальную цену Worker обязан пересчитать сам на сервере — фронтенду
             в этом вопросе доверять нельзя (пользователь может подменить любое поле). -->
        <option value="vip" data-price="150">VIP — 150 ₽</option>
        <option value="premium" data-price="300">Premium — 300 ₽</option>
        <option value="elite" data-price="500">Elite — 500 ₽</option>
      </select>

      <div class="price-preview">
        <span>К оплате</span>
        <span class="amount" id="price-amount">—</span>
      </div>

      <button type="submit" class="pay-btn" id="pay-btn">Оплатить</button>
      <div class="error-msg" id="error-msg"></div>
    </form>

    <p class="hint">Оплата через FreeKassa. Пожертвования не подлежат возврату — см. <a href="oferta.html" style="color:#40E0D0;">публичную оферту</a>.</p>
  </div>

<script>
(() => {
  // Адрес Cloudflare Worker. Заменить на реальный после деплоя (шаг 3 инструкции).
  const WORKER_URL = 'https://minelain-donate.paydonate.workers.dev';

  const form = document.getElementById('donate-form');
  const productSelect = document.getElementById('product');
  const priceAmount = document.getElementById('price-amount');
  const payBtn = document.getElementById('pay-btn');
  const errorMsg = document.getElementById('error-msg');

  // Обновляем отображаемую цену при выборе товара (только визуально)
  productSelect.addEventListener('change', () => {
    const opt = productSelect.selectedOptions[0];
    priceAmount.textContent = opt ? `${opt.dataset.price} ₽` : '—';
  });

  function showError(text) {
    errorMsg.textContent = text;
    errorMsg.classList.add('visible');
  }

  function hideError() {
    errorMsg.classList.remove('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const nickname = document.getElementById('nickname').value.trim();
    const product = productSelect.value;

    if (!nickname || !product) {
      showError('Заполните никнейм и выберите привилегию.');
      return;
    }

    payBtn.disabled = true;
    payBtn.innerHTML = '<span class="spinner"></span>Создаём заказ…';

    try {
      // Отправляем на Worker только ник и ID товара.
      // Цену Worker берёт из своего собственного прайс-листа (env/константа),
      // а не из формы — иначе цену можно было бы подделать через DevTools.
      const res = await fetch(`${WORKER_URL}/init-payment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickname, product })
      });

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `Ошибка сервера (${res.status})`);
      }

      const data = await res.json();

      if (!data.paymentUrl) {
        throw new Error('Сервер не вернул ссылку на оплату.');
      }

      // Редиректим на страницу оплаты FreeKassa
      window.location.href = data.paymentUrl;

    } catch (err) {
      console.error(err);
      showError(err.message || 'Не удалось создать платёж. Попробуйте позже.');
      payBtn.disabled = false;
      payBtn.textContent = 'Оплатить';
    }
  });
})();
</script>

<script src="js/jquery.min.js"></script>
<script>
  // Улучшенная анимация для мобильного меню (идентично index.html)
  document.addEventListener('DOMContentLoaded', function() {
    const menuButton = document.querySelector('[data-collapse-toggle="navbar-sticky"]');
    const menu = document.getElementById('navbar-sticky');

    if (menuButton && menu) {
      menuButton.addEventListener('click', function() {
        const isExpanded = this.getAttribute('aria-expanded') === 'true';

        if (isExpanded) {
          menu.classList.remove('show');
          setTimeout(() => {
            menu.style.display = 'none';
          }, 400);
        } else {
          menu.style.display = 'block';
          setTimeout(() => {
            menu.classList.add('show');
          }, 10);
        }
        this.setAttribute('aria-expanded', String(!isExpanded));
      });

      document.addEventListener('click', function(event) {
        if (!menu.contains(event.target) && !menuButton.contains(event.target)) {
          if (menu.classList.contains('show')) {
            menu.classList.remove('show');
            setTimeout(() => {
              menu.style.display = 'none';
            }, 400);
            menuButton.setAttribute('aria-expanded', 'false');
          }
        }
      });
    }
  });
</script>
